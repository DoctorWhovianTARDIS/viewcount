name: Update All-Time Visitors

on:
  repository_dispatch:
    types: [log_visit]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Read visitor IP from payload
        run: |
          echo "VISITOR_IP=${{ github.event.client_payload.ip }}" >> $GITHUB_ENV

      - name: Ensure all-time.json exists
        run: |
          FILE=all-time.json
          if [ ! -f "$FILE" ]; then
            echo "[]" > "$FILE"
          fi

      - name: Add IP to all-time.json if missing
        run: |
          FILE=all-time.json
          TMP=tmp_all_time.json
          # Safely add the IP only if it's not already present
          jq --arg ip "$VISITOR_IP" 'if index($ip) then . else . + [$ip] end' "$FILE" > "$TMP" && mv "$TMP" "$FILE"

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add all-time.json
          git commit -m "Log visit from $VISITOR_IP" || echo "No changes to commit"
          git push origin HEAD:$(git rev-parse --abbrev-ref HEAD)
